<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analyze Sentiment of Text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f14;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e42;
      border-radius: 14px;
      padding: 2.5rem;
      width: 100%;
      max-width: 460px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #e0e0f0;
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 100%;
      height: 120px;
      resize: vertical;
      background: #0f0f14;
      border: 1px solid #2e2e42;
      border-radius: 8px;
      color: #e0e0f0;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: #55556a; }
    textarea:focus { border-color: #7c6af7; }

    .btn-primary {
      margin-top: 1rem;
      width: 100%;
      padding: 0.85rem;
      background: #7c6af7;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #6a58e0; }

    /* ── History button ── */
    .btn-history {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid #2e2e42;
      border-radius: 8px;
      color: #8888aa;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-history:hover {
      border-color: #7c6af7;
      color: #c0b8ff;
    }

    .error {
      color: #f87171;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tweet Sentiment</h1>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('predict') }}">
      <textarea name="tweet" placeholder="Enter a tweet or any text…"></textarea>
      <button type="submit" class="btn-primary">Predict</button>
    </form>

    <a href="{{ url_for('history_page') }}" class="btn-history">&#128337; See Prediction History</a>
  </div>
</body>
</html>
