<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediction History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f14;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem;
      gap: 1.5rem;
    }

    .topbar {
      width: 100%; max-width: 860px;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800; color: #e0e0f0;
    }

    .topbar-actions { display: flex; gap: 0.6rem; }

    .btn {
      padding: 0.55rem 1.2rem; border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem; font-weight: 500;
      cursor: pointer; border: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }

    .btn-back {
      background: transparent; border: 1px solid #2e2e42; color: #8888aa;
    }
    .btn-back:hover { border-color: #7c6af7; color: #c0b8ff; }

    .btn-clear {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
    }
    .btn-clear:hover { background: rgba(248,113,113,0.2); border-color: #f87171; }
    .btn-clear:disabled { opacity: 0.4; cursor: not-allowed; }

    .table-card {
      width: 100%; max-width: 860px;
      background: #1a1a24; border: 1px solid #2e2e42;
      border-radius: 14px; overflow: hidden;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    thead { background: #0f0f14; }
    thead th {
      padding: 0.9rem 1.2rem; text-align: left;
      color: #55556a; font-weight: 500; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid #2e2e42;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #1e1e2c; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1e1e2e; }

    tbody td { padding: 0.85rem 1.2rem; color: #c0c0d8; vertical-align: middle; }

    .td-text {
      max-width: 220px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; color: #e0e0f0;
    }

    .badge {
      display: inline-block; padding: 0.2rem 0.7rem;
      border-radius: 50px; font-size: 0.75rem;
      font-weight: 500; white-space: nowrap;
    }
    .badge-positive { color: #29e10d; background: rgba(74,222,128,0.12); }
    .badge-negative { color: #f87171; background: rgba(248,113,113,0.12); }
    .badge-neutral  { color: #00e3d4; background: rgba(96,165,250,0.12); }

    .td-time { color: #55556a; font-size: 0.78rem; white-space: nowrap; }

    /* ── Confidence bar ── */
    .conf-wrap {
      display: flex; align-items: center; gap: 0.5rem; min-width: 100px;
    }
    .conf-bar-bg {
      flex: 1; height: 6px; border-radius: 99px;
      background: #2e2e42; overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.4s ease;
    }
    .conf-bar-fill.pos { background: #29e10d; }
    .conf-bar-fill.neg { background: #f87171; }
    .conf-pct { font-size: 0.75rem; color: #8888aa; white-space: nowrap; }

    /* ── States ── */
    .state-row td {
      text-align: center; padding: 3rem 1rem;
      color: #55556a; font-size: 0.85rem;
    }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #2e2e42; border-top-color: #7c6af7;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 0.5rem; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a24; border: 1px solid #2e2e42;
      border-radius: 8px; padding: 0.6rem 1.4rem;
      color: #e0e0f0; font-size: 0.82rem; opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,10,18,0.75);
      align-items: center; justify-content: center; z-index: 100;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #1a1a24; border: 1px solid #2e2e42;
      border-radius: 14px; padding: 2rem;
      max-width: 340px; width: 90%; text-align: center;
    }
    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; color: #e0e0f0; margin-bottom: 0.6rem;
    }
    .modal p { color: #8888aa; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: center; }
    .btn-cancel { background: transparent; border: 1px solid #2e2e42; color: #8888aa; }
    .btn-cancel:hover { border-color: #7c6af7; color: #c0b8ff; }
    .btn-confirm-clear { background: #f87171; color: #fff; border: none; }
    .btn-confirm-clear:hover { background: #ef4444; }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Prediction History</h1>
    <div class="topbar-actions">
      <a href="/" class="btn btn-back">&#8592; Back</a>
      <button class="btn btn-clear" id="clearBtn" disabled>&#128465; Clear Records</button>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Input Text</th>
          <th>Result</th>
          <th>Positive Confidence</th>
          <th>Negative Confidence</th>
          <th>Date &amp; Time</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr class="state-row">
          <td colspan="6"><span class="spinner"></span>Loading…</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="overlay" id="confirmOverlay">
    <div class="modal">
      <h2>Clear all records?</h2>
      <p>This will permanently delete every prediction in the history. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="cancelClear">Cancel</button>
        <button class="btn btn-confirm-clear" id="confirmClear">Yes, Clear</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const tbody      = document.getElementById('historyBody');
    const clearBtn   = document.getElementById('clearBtn');
    const overlay    = document.getElementById('confirmOverlay');
    const cancelBtn  = document.getElementById('cancelClear');
    const confirmBtn = document.getElementById('confirmClear');
    const toast      = document.getElementById('toast');

    function badgeClass(label) {
      const l = label.toLowerCase();
      if (l.includes('positive')) return 'badge-positive';
      if (l.includes('negative')) return 'badge-negative';
      return 'badge-neutral';
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function showToast(msg, duration = 2500) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* renders a confidence bar + percentage */
    function confBar(value, type) {
      const pct = value != null ? (value * 100).toFixed(1) : null;
      if (pct === null) return '<span style="color:#55556a">—</span>';
      return `
        <div class="conf-wrap">
          <div class="conf-bar-bg">
            <div class="conf-bar-fill ${type}" style="width:${pct}%"></div>
          </div>
          <span class="conf-pct">${pct}%</span>
        </div>`;
    }

    async function loadHistory() {
      tbody.innerHTML = `<tr class="state-row"><td colspan="6"><span class="spinner"></span>Loading…</td></tr>`;
      clearBtn.disabled = true;

      try {
        const res  = await fetch('/api/history');
        const json = await res.json();

        if (!res.ok) throw new Error(json.error || 'Server error');

        const rows = json.data;

        if (!rows || rows.length === 0) {
          tbody.innerHTML = `<tr class="state-row"><td colspan="6">No predictions yet.</td></tr>`;
          return;
        }

        tbody.innerHTML = rows.map((row, i) => `
          <tr>
            <td style="color:#55556a;font-size:0.78rem;">${i + 1}</td>
            <td class="td-text" title="${escHtml(row.input_text)}">${escHtml(row.input_text)}</td>
            <td><span class="badge ${badgeClass(row.result)}">${escHtml(row.result)}</span></td>
            <td>${confBar(row.pos_prob, 'pos')}</td>
            <td>${confBar(row.neg_prob, 'neg')}</td>
            <td class="td-time">${formatDate(row.created_at)}</td>
          </tr>
        `).join('');

        clearBtn.disabled = false;

      } catch (err) {
        tbody.innerHTML = `<tr class="state-row"><td colspan="6" style="color:#f87171;">Failed to load: ${escHtml(err.message)}</td></tr>`;
      }
    }

    clearBtn.addEventListener('click', () => overlay.classList.add('open'));
    cancelBtn.addEventListener('click', () => overlay.classList.remove('open'));

    confirmBtn.addEventListener('click', async () => {
      overlay.classList.remove('open');
      clearBtn.disabled = true;
      try {
        const res  = await fetch('/api/history', { method: 'DELETE' });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Delete failed');
        showToast(' History cleared.');
        loadHistory();
      } catch (err) {
        showToast('Error: ' + err.message);
        clearBtn.disabled = false;
      }
    });

    loadHistory();
  </script>
</body>
</html>
